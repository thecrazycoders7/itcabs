name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      # Testcontainers spins up Postgres via Docker, which ubuntu-latest provides.
      - name: Build + test
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon --stacktrace

  android:
    name: Android (assemble + unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Assemble debug + unit tests
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug testDebugUnitTest --no-daemon --stacktrace
