spring:
  application:
    name: itcabs-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/itcabs}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    baseline-on-migrate: true

itcabs:
  jwt:
    # Dev secret only. In staging/prod inject a strong secret via env (ADR-0010).
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me-32b}
    access-ttl-minutes: 15
    refresh-ttl-days: 30
  otp:
    ttl-seconds: 300
    # Rate limit: at most max-per-window OTP requests per phone per window-seconds.
    max-per-window: 5
    window-seconds: 600
    # Provider: 'dev' logs the code (no SMS); 'msg91' sends via MSG91 Flow.
    provider: ${OTP_PROVIDER:dev}
    # Dev only: OTP is logged, not sent by SMS. Set false in prod.
    dev-log-code: true
    msg91:
      auth-key: ${MSG91_AUTH_KEY:}
      # itcabs_otp template (Sender ID ITCABS). Template ids aren't secret; the auth key is (env only).
      template-id: ${MSG91_TEMPLATE_ID:6a61b42d1f71589594074812}
  push:
    # 'noop' (default, dev/CI) or 'fcm'. FCM needs a service-account credentials file.
    provider: ${PUSH_PROVIDER:noop}
    fcm:
      credentials: ${FIREBASE_CREDENTIALS:}

springdoc:
  swagger-ui:
    path: /docs
